<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Expense Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <h1 class="text-center text-primary mb-4">Expense Tracker 💰</h1>
        
        <div class="card p-4 shadow-sm mb-5">
            <h3>Add New Expense</h3>
            <form action="/add" method="POST">
                <div class="mb-3">
                    <input type="text" name="item" class="form-control" placeholder="Item Name (e.g. Coffee)" required>
                </div>
                <div class="mb-3">
                    <input type="number" name="amount" class="form-control" placeholder="Amount (₹)" required>
                </div>
                <div class="mb-3">
                    <select name="category" class="form-select">
                        <option value="Food">🍔 Food</option>
                        <option value="Travel">🚌 Travel</option>
                        <option value="Studies">📚 Studies</option>
                        <option value="Other">✨ Other</option>
                    </select>
                </div>
                <button type="submit" class="btn btn-primary w-100">Add to List</button>
            </form>
        </div>

        <div class="card p-4 shadow-sm">
            <h3>My Expenses</h3>
            <table class="table table-hover mt-3">
                <thead class="table-dark">
                    <tr>
                        <th>Item</th>
                        <th>Category</th> <th>Amount (₹)</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody>
                    {% for expense in expenses %}
                    <tr>
                        <td>{{ expense[1] }}</td>
                        <td>{{ expense[3] }}</td> <td>{{ expense[2] }}</td>
                        <td>
                            <a href="/delete/{{ expense[0] }}" class="btn btn-danger btn-sm">Delete</a>
                        </td>
                    </tr>
                    {% endfor %}
                    <tr class="table-info">
                        <td><strong>Total Spending</strong></td>
                        <td><strong>₹ {{ total }}</strong></td>
                        <td></td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
